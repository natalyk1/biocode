  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"he\" dir=\"rtl\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>סימולציית ניסוי אברי — BioCode · מכון דוידסון<\u002Ftitle>\n\n\n\n<style>/* BioCode Design System — global entry point.\n   Consumers link THIS file. It is an @import manifest only. */\n\n/* BioCode — Webfonts\n   Assistant (variable 200–800), the brand's single typeface.\n   Self-hosted woff2 subsets pulled from Google Fonts: Hebrew (primary), Latin, Latin-ext. */\n\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 200 800;\n  font-display: swap;\n  src: url(\"99752d31-a4ee-4cdc-bfb3-a61bbfcd36ec\") format('woff2');\n  unicode-range: U+0307-0308, U+0590-05FF, U+200C-2010, U+20AA, U+25CC, U+FB1D-FB4F;\n}\n\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 200 800;\n  font-display: swap;\n  src: url(\"eda0c184-1237-4e48-ace3-7e50075dda65\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n\n@font-face {\n  font-family: 'Assistant';\n  font-style: normal;\n  font-weight: 200 800;\n  font-display: swap;\n  src: url(\"217b5256-0723-4794-9f28-8b6437e545f5\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n/* BioCode — Color tokens\n   Source of truth: the BioCode/Medicode brand deck (Davidson Institute).\n   Most surfaces are WHITE; ink is the deep navy #151629.\n   The brand's energy comes from a 6-hue gradient palette taken from the\n   logo's DNA helix and the palette graphic. */\n\n:root {\n  /* ---- Ink & surface (white-first) ---- */\n  --ink:            #151629; /* primary text, headlines, logo bracket */\n  --ink-2:          #21234E; /* deep indigo — secondary dark surfaces */\n  --ink-muted:      #5b5c6e; /* muted body text on white */\n  --ink-faint:      #8a8b99; /* captions, metadata */\n  --white:          #ffffff;\n  --surface:        #ffffff; /* default page surface */\n  --surface-soft:   #f5f7fb; /* faint blue-grey panel */\n  --surface-mute:   #eef1f7; /* tinted fill / track */\n  --hairline:       #e2e6ef; /* borders, dividers on white */\n  --hairline-strong:#cfd5e3;\n\n  /* ---- Brand hues (solid) ---- */\n  --blue-deep:      #166595; /* anchor blue (most-used accent) */\n  --blue:           #3fafe6;\n  --blue-bright:    #43b9f4;\n  --blue-sky:       #67c0ff;\n  --indigo:         #5677f9;\n  --purple:         #8585eb;\n  --purple-light:   #9c93ff;\n  --teal:           #2d9bb5;\n  --cyan:           #46bec9;\n  --green:          #24b467;\n  --yellow:         #f0cd33;\n  --coral:          #ff513b;\n  --red:            #ef4e5d;\n  --pink:           #fe387c;\n  --magenta:        #f70d80;\n  --magenta-pink:   #ea40ca;\n\n  /* ---- Tints (12% on white) for soft fills / chips ---- */\n  --blue-deep-tint: #e7eef3;\n  --blue-tint:      #e4f3fc;\n  --indigo-tint:    #e9edfe;\n  --purple-tint:    #eeeefc;\n  --teal-tint:      #e5f2f5;\n  --green-tint:     #e3f5ec;\n  --yellow-tint:    #fdf6dc;\n  --coral-tint:     #ffe7e3;\n  --pink-tint:      #ffe3ee;\n  --magenta-tint:   #fde0f1;\n\n  /* ---- The six brand gradients (logo + palette graphic) ---- */\n  --grad-blue:      linear-gradient(160deg, #166595 0%, #43b9f4 100%); /* @kind color */\n  --grad-indigo:    linear-gradient(160deg, #5677f9 0%, #9c93ff 100%); /* @kind color */\n  --grad-teal:      linear-gradient(160deg, #2d9bb5 0%, #24b467 100%); /* @kind color */\n  --grad-lime:      linear-gradient(160deg, #f0cd33 0%, #24b467 100%); /* @kind color */\n  --grad-coral:     linear-gradient(160deg, #ff513b 0%, #fe387c 100%); /* @kind color */\n  --grad-magenta:   linear-gradient(160deg, #f70d80 0%, #8585eb 100%); /* @kind color */\n\n  /* Signature full-spectrum sweep (logo helix order: teal→green→yellow→coral→pink→purple) */\n  --grad-spectrum:  linear-gradient(90deg, #46bec9 0%, #24b467 20%, #f0cd33 40%, #ff513b 60%, #f70d80 80%, #8585eb 100%); /* @kind color */\n  /* Hero indigo wash for dark cover sections */\n  --grad-ink:       linear-gradient(160deg, #21234E 0%, #151629 100%); /* @kind color */\n\n  /* ---- Semantic aliases ---- */\n  --text-strong:    var(--ink);\n  --text-body:      var(--ink-muted);\n  --text-caption:   var(--ink-faint);\n  --text-on-dark:   var(--white);\n  --accent:         var(--blue-deep);\n  --accent-bright:  var(--blue-bright);\n  --link:           var(--blue-deep);\n\n  --success:        var(--green);\n  --danger:         var(--coral);\n  --warning:        var(--yellow);\n  --info:           var(--blue-bright);\n\n  --surface-card:   var(--white);\n  --border-card:    var(--hairline);\n  --focus-ring:     #43b9f4;\n}\n\n/* BioCode — Typography tokens\n   One typeface: Assistant. Headings are bold (700); body is regular (400).\n   The brand's documented presentation scale (from the deck) in PT:\n     Cover title 88 · Cover subtitle 54 · H1 40 · H2 36 · H3 28\n     Eyebrow 18 · Body 24 · Bullet 24 · Caption 16  — all headings BOLD.\n   Below we expose both a faithful PRESENTATION scale (rem ≈ those pts at\n   96dpi, for slides/infographics) and a compact UI scale for components. */\n\n:root {\n  --font-sans: 'Assistant', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;\n  --font-display: var(--font-sans);\n\n  /* Weights */\n  --fw-light:     300; /* @kind font */\n  --fw-regular:   400; /* @kind font */\n  --fw-medium:    500; /* @kind font */\n  --fw-semibold:  600; /* @kind font */\n  --fw-bold:      700; /* @kind font */\n  --fw-extrabold: 800; /* @kind font */\n\n  /* ---- Presentation scale (slides, posters, infographics) ---- */\n  --fs-cover:      5.5rem;   /* 88px — gate/cover title */\n  --fs-cover-sub:  3.375rem; /* 54px — cover subtitle */\n  --fs-h1:         2.5rem;   /* 40px */\n  --fs-h2:         2.25rem;  /* 36px */\n  --fs-h3:         1.75rem;  /* 28px */\n  --fs-eyebrow:    1.125rem; /* 18px — kicker / wrapper title */\n  --fs-body-lg:    1.5rem;   /* 24px — body & bullets on slides */\n  --fs-caption:    1rem;     /* 16px — image captions */\n\n  /* ---- UI scale (components, dense screens) ---- */\n  --fs-display:    2.5rem;   /* 40 */\n  --fs-title:      1.75rem;  /* 28 */\n  --fs-subtitle:   1.375rem; /* 22 */\n  --fs-lg:         1.125rem; /* 18 */\n  --fs-base:       1rem;     /* 16 */\n  --fs-sm:         0.875rem; /* 14 */\n  --fs-xs:         0.75rem;  /* 12 */\n\n  /* Line heights */\n  --lh-tight:   1.1;   /* @kind font */\n  --lh-snug:    1.25;  /* @kind font */\n  --lh-normal:  1.5;   /* @kind font */\n  --lh-relaxed: 1.65;  /* @kind font */\n\n  /* Letter spacing — Assistant headings sit nicely a touch tight;\n     eyebrows are tracked out. */\n  --ls-tight:   -0.01em; /* @kind font */\n  --ls-normal:  0;       /* @kind font */\n  --ls-eyebrow: 0.08em;  /* @kind font */\n}\n\n/* BioCode — Spacing & layout tokens\n   8px base rhythm. The brand is airy on white — generous gutters,\n   roomy padding inside cards. */\n\n:root {\n  --space-0:   0;\n  --space-1:   0.25rem; /* 4 */\n  --space-2:   0.5rem;  /* 8 */\n  --space-3:   0.75rem; /* 12 */\n  --space-4:   1rem;    /* 16 */\n  --space-5:   1.5rem;  /* 24 */\n  --space-6:   2rem;    /* 32 */\n  --space-7:   2.5rem;  /* 40 */\n  --space-8:   3rem;    /* 48 */\n  --space-9:   4rem;    /* 64 */\n  --space-10:  5rem;    /* 80 */\n  --space-12:  6rem;    /* 96 */\n\n  /* Containers */\n  --container-sm:  640px;\n  --container-md:  860px;\n  --container-lg:  1100px;\n  --container-xl:  1320px;\n  --gutter:        var(--space-6);\n}\n\n/* BioCode — Effects: radii, shadows, borders, motion\n   Rounded, friendly geometry (the icons and palette capsules are all\n   generously rounded). Soft, cool-tinted shadows on white. */\n\n:root {\n  /* Corner radii */\n  --radius-xs:   6px;\n  --radius-sm:   10px;\n  --radius-md:   16px;  /* default card */\n  --radius-lg:   24px;\n  --radius-xl:   32px;\n  --radius-pill: 999px; /* capsules, chips, buttons */\n  --radius-hex:  18px;  /* hexagon corner softness reference */\n\n  /* Borders */\n  --border-thin:  1px solid var(--hairline);          /* @kind other */\n  --border-mid:   1.5px solid var(--hairline-strong);  /* @kind other */\n  --border-focus: 2px solid var(--focus-ring);         /* @kind other */\n\n  /* Shadows — cool navy-tinted, never grey/black */\n  --shadow-xs: 0 1px 2px rgba(21, 22, 41, 0.06);\n  --shadow-sm: 0 2px 8px rgba(21, 22, 41, 0.07);\n  --shadow-md: 0 8px 24px rgba(21, 22, 41, 0.09);\n  --shadow-lg: 0 18px 48px rgba(21, 22, 41, 0.12);\n  --shadow-blue: 0 10px 28px rgba(22, 101, 149, 0.22); /* colored lift for primary buttons */\n\n  /* Motion */\n  --ease-out:   cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --ease-soft:  cubic-bezier(0.4, 0, 0.2, 1);       /* @kind other */\n  --dur-fast:   140ms; /* @kind other */\n  --dur-base:   220ms; /* @kind other */\n  --dur-slow:   360ms; /* @kind other */\n}\n\n/* BioCode — Base element defaults\n   Applies the brand's white-first, Assistant, RTL-friendly foundation.\n   Hebrew is the primary language; set dir=\"rtl\" on the document or container. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-weight: var(--fw-regular);\n  font-size: var(--fs-base);\n  line-height: var(--lh-normal);\n  color: var(--text-body);\n  background: var(--surface);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  color: var(--text-strong);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-tight);\n  text-wrap: balance;\n}\n\np { margin: 0; text-wrap: pretty; }\n\na { color: var(--link); text-decoration: none; }\na:hover { text-decoration: underline; }\n\nimg, svg { display: block; max-width: 100%; }\n\nstrong, b { font-weight: var(--fw-bold); }\n\n::selection { background: var(--blue-tint); color: var(--ink); }\n\n:focus-visible {\n  outline: var(--border-focus);\n  outline-offset: 2px;\n  border-radius: var(--radius-xs);\n}\n\n<\u002Fstyle>\n<style>\n  *, *::before, *::after { box-sizing: border-box; }\n  body {\n    background: var(--surface-soft);\n    color: var(--text-body);\n    min-height: 100vh;\n    padding: var(--space-6) var(--space-5) var(--space-10);\n  }\n  .wrap { max-width: 940px; margin: 0 auto; }\n\n  /* ---------- Top bar ---------- */\n  .topbar { display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-5); }\n  .topbar .biocode { height: 52px; width: auto; }\n  .dav-pill { display: inline-flex; align-items: center; gap: 10px; background: var(--grad-ink); border-radius: var(--radius-pill); padding: 9px 16px 9px 18px; }\n  .dav-pill img { height: 30px; width: auto; }\n  .dav-pill span { color: rgba(255,255,255,.85); font-size: var(--fs-sm); font-weight: var(--fw-semibold); white-space: nowrap; }\n\n  /* ---------- Header ---------- */\n  .head { margin-bottom: var(--space-5); }\n  .eyebrow { display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; background: var(--blue-tint); color: var(--blue-deep);\n    font-weight: var(--fw-bold); font-size: var(--fs-sm); padding: 6px 14px; border-radius: var(--radius-pill); margin-bottom: var(--space-4); }\n  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue-deep); }\n  h1 { font-size: var(--fs-title); color: var(--ink); margin-bottom: 8px; line-height: var(--lh-snug); }\n  .head p { font-size: var(--fs-lg); color: var(--ink-muted); max-width: 680px; line-height: var(--lh-normal); }\n\n  /* ---------- Steps ---------- */\n  .steps { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }\n  .steps-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: var(--space-5); }\n  .restart { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; font-family: var(--font-sans); font-weight: var(--fw-bold);\n    font-size: var(--fs-sm); color: var(--ink-muted); background: var(--white); border: 1px solid var(--hairline-strong); border-radius: var(--radius-pill);\n    padding: 8px 16px; cursor: pointer; transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast); }\n  .restart:hover { background: var(--surface-mute); border-color: var(--ink-faint); color: var(--ink); }\n  .restart .ri { font-size: 15px; }\n  .step { display: flex; align-items: center; gap: 9px; padding: 8px 16px; border-radius: var(--radius-pill); white-space: nowrap;\n    background: var(--white); border: 1px solid var(--hairline); font-size: var(--fs-sm); font-weight: var(--fw-semibold); color: var(--ink-faint); transition: all var(--dur-base) var(--ease-out); }\n  .step .num { width: 22px; height: 22px; border-radius: 50%; display: grid; place-items: center; font-size: var(--fs-xs);\n    font-weight: var(--fw-bold); background: var(--surface-mute); color: var(--ink-faint); flex: none; }\n  .step.active { color: var(--ink); border-color: transparent; background: var(--blue-deep); }\n  .step.active { color: #fff; }\n  .step.active .num { background: rgba(255,255,255,.25); color: #fff; }\n  .step.done { color: var(--green); border-color: var(--green-tint); background: var(--green-tint); }\n  .step.done .num { background: var(--green); color: #fff; }\n  .step-sep { color: var(--hairline-strong); font-size: 18px; }\n\n  /* ---------- Lab grid ---------- */\n  .lab { display: grid; grid-template-columns: 0.95fr 1.05fr; gap: var(--space-5); margin-bottom: var(--space-5); }\n  @media (max-width: 680px){ .lab { grid-template-columns: 1fr; } }\n  .panel { background: var(--white); border: 1px solid var(--hairline); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: var(--space-5); position: relative; overflow: hidden; }\n  .panel-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: var(--space-4); }\n  .panel-title { font-size: var(--fs-lg); font-weight: var(--fw-bold); color: var(--ink); }\n  .panel-sub { font-size: var(--fs-sm); color: var(--ink-faint); }\n\n  /* ---------- Enzyme cards ---------- */\n  .enzymes { display: flex; flex-direction: column; gap: 10px; }\n  .ez { display: flex; align-items: center; gap: 12px; background: var(--white); border: 1.5px solid var(--hairline); border-radius: var(--radius-sm);\n    padding: 11px 14px; cursor: pointer; user-select: none; transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out), opacity var(--dur-base); }\n  .ez:hover:not(.used) { border-color: var(--blue-bright); box-shadow: var(--shadow-sm); }\n  .ez:active:not(.used) { transform: translateY(1px); }\n  .ez.dragging { opacity: .35; }\n  .ez.used { opacity: .32; cursor: not-allowed; filter: grayscale(.5); }\n  .ez .ic { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: var(--fw-bold); font-size: var(--fs-base); flex: none; box-shadow: var(--shadow-xs); }\n  .ez .ic.flask { background: var(--surface-mute); color: var(--ink-faint); font-size: 18px; }\n  .ic-protease { background: var(--grad-coral); }\n  .ic-rnase    { background: var(--grad-indigo); }\n  .ic-dnase    { background: var(--grad-blue); }\n  .ez .nm { font-size: var(--fs-base); font-weight: var(--fw-bold); color: var(--ink); }\n  .ez .ds { font-size: var(--fs-sm); color: var(--ink-muted); margin-top: 1px; white-space: nowrap; }\n  .ez .add { margin-inline-start: auto; white-space: nowrap; font-size: var(--fs-xs); font-weight: var(--fw-bold); color: var(--blue-deep); background: var(--blue-tint); padding: 4px 10px; border-radius: var(--radius-pill); }\n  .ez.used .add { background: var(--green-tint); color: var(--green); }\n\n  /* ---------- Tube ---------- */\n  .tube-wrap { display: flex; flex-direction: column; align-items: center; }\n  .tube-zone { width: 100%; min-height: 210px; border: 2px dashed var(--hairline-strong); border-radius: var(--radius-md);\n    display: flex; align-items: center; justify-content: center; gap: 18px; padding: 16px; transition: border-color var(--dur-base), background var(--dur-base); }\n  .tube-zone.over { border-color: var(--blue-bright); background: var(--blue-tint); }\n  .tube-zone.filled { border-style: solid; border-color: var(--hairline); background: var(--surface-soft); }\n\n  .tube { position: relative; width: 92px; height: 168px; flex: none; }\n  .tube .cap { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 18px; background: #fff; border: 2px solid var(--ink); border-bottom: none; border-radius: 6px 6px 0 0; z-index: 3; }\n  .tube .glass { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 56px; height: 152px; border: 2px solid var(--ink); border-top: none; border-radius: 0 0 26px 26px; overflow: hidden; background: rgba(255,255,255,.5); }\n  .tube .liquid { position: absolute; bottom: 0; left: 0; right: 0; height: 0; background: var(--blue-tint); transition: height .7s var(--ease-out), background .5s; }\n  .tube .shine { position: absolute; top: 22px; left: 10px; width: 8px; height: 100px; background: rgba(255,255,255,.55); border-radius: 4px; z-index: 4; }\n  .tube .deadcell { position: absolute; width: 30px; left: 50%; transform: translateX(-50%); z-index: 2; filter: grayscale(.55) brightness(1.04); opacity: .82; }\n  .tube .dc1 { bottom: 30px; margin-inline-start: -12px; }\n  .tube .dc2 { bottom: 58px; margin-inline-start: 13px; width: 26px; }\n  .tube .enztok { position: absolute; top: -36px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: var(--fw-bold); font-size: var(--fs-sm); opacity: 0; z-index: 5; }\n  .tube .enztok.drop { animation: tokDrop .7s var(--ease-out) forwards; }\n  @keyframes tokDrop { 0%{opacity:0; top:-36px;} 30%{opacity:1;} 70%{top:46px;} 85%{top:38px;} 100%{opacity:1; top:42px;} }\n\n  .tube-hint { text-align: center; color: var(--ink-faint); font-size: var(--fs-sm); line-height: var(--lh-snug); }\n  .tube-hint .ar { font-size: 22px; display: block; margin-bottom: 4px; color: var(--blue-bright); }\n\n  /* contents / molecule readout */\n  .contents { margin-top: var(--space-4); }\n  .contents-lbl { font-size: var(--fs-sm); font-weight: var(--fw-bold); color: var(--ink); margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }\n  .mol-row { display: flex; gap: 8px; flex-wrap: wrap; }\n  .mol { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--radius-pill); font-size: var(--fs-sm); font-weight: var(--fw-bold); border: 1.5px solid transparent; transition: all var(--dur-base) var(--ease-out); }\n  .mol .swatch { width: 10px; height: 10px; border-radius: 3px; }\n  .mol.protein { background: var(--coral-tint); color: var(--coral); }\n  .mol.protein .swatch { background: var(--coral); }\n  .mol.rna { background: var(--indigo-tint); color: var(--indigo); }\n  .mol.rna .swatch { background: var(--indigo); }\n  .mol.dna { background: var(--blue-tint); color: var(--blue-deep); }\n  .mol.dna .swatch { background: var(--blue-deep); }\n  .mol.gone { text-decoration: line-through; opacity: .42; background: var(--surface-mute) !important; color: var(--ink-faint) !important; animation: shatter .5s var(--ease-out); }\n  .mol.gone .swatch { background: var(--ink-faint) !important; }\n  @keyframes shatter { 0%{transform:scale(1.12); } 40%{transform:scale(.9) rotate(-3deg);} 100%{tra bold); color: var(--green); background: var(--green-tint); padding: 6px 13px; border-radius: var(--radius-pill); margin-bottom: var(--space-4); }\n  .stage-label { font-size: var(--fs-lg); font-weight: var(--fw-semibold); color: var(--ink); margin-bottom: var(--space-5); min-height: 26px; line-height: var(--lh-normal); text-align: center; }\n\n  /* mixing scene */\n  .scene { position: relative; height: 250px; display: flex; align-items: flex-end; justify-content: center; gap: 30px; }\n  .dish { position: relative; width: 280px; height: 150px; border-radius: 50%/40% 40% 60% 60%; background: linear-gradient(180deg,#eef6fc,#e2eef8);\n    border: 2px solid var(--hairline-strong); box-shadow: inset 0 6px 16px rgba(21,22,41,.06); display: flex; align-items: center; justify-content: center; gap: 4px; transition: background .6s; overflow: visible; }\n  .dish.tinted { background: linear-gradient(180deg,#e9f5ee,#dcefe4); }\n  .dish-label { position: absolute; bottom: -26px; left: 0; right: 0; text-align: center; font-size: var(--fs-sm); font-weight: var(--fw-semibold); color: var(--ink-faint); }\n  .cell { position: relative; width: 62px; height: 96px; }\n  .cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; transition: opacity .8s var(--ease-out), transform .8s var(--ease-out); }\n  .cell .s { opacity: 0; transform: scale(.6); }\n  .cell.x .r { opacity: 0; transform: scale(.6); }\n  .cell.x .s { opacity: 1; transform: scale(1); }\n  .cell .glow { position: absolute; inset: -10px; border-radius: 50%; background: radial-gradient(circle, rgba(67,185,244,.55), transparent 70%); opacity: 0; }\n  .cell.pop .glow { animation: glowPop 1s var(--ease-out); }\n  @keyframes glowPop { 0%{opacity:0; transform:scale(.5);} 40%{opacity:1;} 100%{opacity:0; transform:scale(1.6);} }\n  .cell.shake { animation: shake .5s var(--ease-out); }\n  @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-5px);} 40%{transform:translateX(5px);} 60%{transform:translateX(-3px);} 80%{transform:translateX(3px);} }\n\n  /* pour tube */\n  .pour { position: absolute; top: -6px; left: 50%; width: 64px; height: 120px; transform: translateX(-50%) translateY(-30px); opacity: 0; transition: transform .8s var(--ease-out), opacity .4s; }\n  .pour.in { opacity: 1; transform: translateX(-50%) translateY(0); }\n  .pour.tip { transform: translateX(-120px) translateY(-6px) rotate(108deg); }\n  .pour .pcap { position:absolute; top:0; left:50%; transform:translateX(-50%); width:42px;height:13px;background:#fff;border:2px solid var(--ink);border-bottom:none;border-radius:5px 5px 0 0;}\n  .pour .pbody { position:absolute; top:11px; left:50%; transform:translateX(-50%); width:40px;height:108px;border:2px solid var(--ink);border-top:none;border-radius:0 0 20px 20px; overflow:hidden; background:rgba(255,255,255,.5);}\n  .pour .pliq { position:absolute; bottom:0; left:0; right:0; height:64px; background: var(--blue-tint); }\n  .drip { position: absolute; left: 50%; top: 60px; width: 8px; height: 8px; border-radius: 0 50% 50% 50%; background: var(--blue-bright); opacity: 0; z-index: 6; }\n  .drip.go { animation: drip 1.1s var(--ease-out) 2; }\n  @keyframes drip { 0%{opacity:0; top:54px; transform: rotate(45deg) scale(.6);} 20%{opacity:1;} 80%{opacity:1; top:150px; transform: rotate(45deg) scale(1);} 100%{opacity:0; top:165px;} }\n\n  .verdict { display: inline-flex; align-items: center; gap: 8px; margin-top: var(--space-5); padding: 8px 18px; border-radius: var(--radius-pill);\n    font-weight: var(--fw-bold); font-size: var(--fs-base); opacity: 0; transition: opacity .5s; }\n  .verdict.show { opacity: 1; }\n  .verdict.yes { background: var(--blue-tint); color: var(--blue-deep); }\n  .verdict.no { background: var(--green-tint); color: var(--green); }\n  .scene-foot { text-align:center; }\n\n  /* result card */\n  .result { border-radius: var(--radius-md); padding: var(--space-5); border: 1.5px solid; margin-bottom: var(--space-5); display: flex; gap: var(--space-4); align-items: flex-start; }\n  .result.yes { background: var(--blue-tint); border-color: var(--blue-bright); }\n  .result.no { background: var(--green-tint); border-color: var(--green); }\n  .result .ric { width: 46px; height: 46px; flex: none; }\n  .result .rh { font-size: var(--fs-lg); font-weight: var(--fw-bold); margin-bottom: 4px; }\n  .result.yes .rh { color: var(--blue-deep); }\n  .result.no .rh { color: var(--green); }\n  .result .rb { font-size: var(--fs-base); color: var(--ink-muted); line-height: var(--lh-normal); }\n\n  /* table */\n  .obs-lbl { font-size: var(--fs-base); font-weight: var(--fw-bold); color: var(--ink); margin: var(--space-5) 0 10px; display:flex; align-items:center; gap:8px; }\n  table.obs { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); background: var(--white); border: 1px solid var(--hairline); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }\n  table.obs th { text-align: right; padding: 12px 14px; background: var(--ink); color: #fff; font-weight: var(--fw-bold); }\n  table.obs td { padding: 11px 14px; border-bottom: 1px solid var(--hairline); color: var(--ink); }\n  table.obs tr:last-child td { border-bottom: none; }\n  .tbadge { display: inline-block; padding: 3px 11px; border-radius: var(--radius-pill); font-size: var(--fs-xs); font-weight: var(--fw-bold); }\n  .tbadge.yes { background: var(--blue-tint); color: var(--blue-deep); }\n  .tbadge.no { background: var(--green-tint); color: var(--green); }\n\n  /* conclusion */\n  .conclusion { display: none; margin-top: var(--space-5); background: var(--grad-ink); color: #fff; border-radius: var(--radius-md); padding: var(--space-6); align-items: flex-start; gap: var(--space-4); box-shadow: var(--shadow-md); }\n  .conclusion.show { display: flex; animation: fadeUp .5s var(--ease-out); }\n  .conclusion img { width: 48px; flex: none; }\n  .conclusion h3 { color: #fff; font-size: var(--fs-title); margin-bottom: 8px; }\n  .conclusion p { color: rgba(255,255,255,.85); font-size: var(--fs-base); line-height: var(--lh-relaxed); }\n  .conclusion .hl { color: var(--blue-sky); font-weight: var(--fw-bold); }\n\n  @media (prefers-reduced-motion: reduce) {\n    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <div class=\"topbar\">\n    <img class=\"biocode\" src=\"195a88e1-d4d5-4a1b-924c-007037383236\" alt=\"BioCode\">\n    <div class=\"dav-pill\">\n      <img src=\"915e1b38-0445-4963-871e-d02d209cceaf\" alt=\"מכון דוידסון\">\n      <span>מכון דוידסון<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"head\">\n    <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>שיעור · מהו קוד החיים?<\u002Fdiv>\n    <h1>ניסוי אֵיוֵרי, מקלאוד ומקארטי (1944) — מי נושא את המידע התורשתי?<\u002Fh1>\n    <p>במבחנה יש תמצית מחיידקי <b>S<\u002Fb> מתים. הוסיפו אנזים שמפרק מולקולה אחת, ואז ערבבו את התמצית עם חיידקי <b>R<\u002Fb> חיים — וגלו איזו מולקולה גורמת לטרנספורמציה.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"steps-row\">\n    <div class=\"steps\" id=\"steps\">\n      <div class=\"step active\" id=\"st1\"><span class=\"num\">1<\u002Fspan>הוסיפו אנזים<\u002Fdiv>\n      <span class=\"step-sep\">‹<\u002Fspan>\n      <div class=\"step\" id=\"st2\"><span class=\"num\">2<\u002Fspan>ערבבו עם R<\u002Fdiv>\n      <span class=\"step-sep\">‹<\u002Fspan>\n      <div class=\"step\" id=\"st3\"><span class=\"num\">3<\u002Fspan>תוצאה<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"restart\" id=\"restartBtn\"><span class=\"ri\">↺<\u002Fspan>התחילו מחדש<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"lab\">\n    <!-- enzymes -->\n    <div class=\"panel\">\n      <div class=\"panel-head\">\n        <span class=\"panel-title\">בחרו אנזים<\u002Fspan>\n        <span class=\"panel-sub\">כל אנזים מפרק מולקולה אחת<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"enzymes\" id=\"enzymes\">\n        <div class=\"ez\" draggable=\"true\" data-ez=\"Protease\">\n          <div class=\"ic ic-protease\">P<\u002Fdiv>\n          <div><div class=\"nm\">Protease<\u002Fdiv><div class=\"ds\">מפרק חלבונים<\u002Fdiv><\u002Fdiv>\n          <span class=\"add\">הוסיפו +<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ez\" draggable=\"true\" data-ez=\"RNase\">\n          <div class=\"ic ic-rnase\">R<\u002Fdiv>\n          <div><div class=\"nm\">RNase<\u002Fdiv><div class=\"ds\">מפרק RNA<\u002Fdiv><\u002Fdiv>\n          <span class=\"add\">הוסיפו +<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ez\" draggable=\"true\" data-ez=\"DNase\">\n          <div class=\"ic ic-dnase\">D<\u002Fdiv>\n          <div><div class=\"nm\">DNase<\u002Fdiv><div class=\"ds\">מפרק DNA<\u002Fdiv><\u002Fdiv>\n          <span class=\"add\">הוסיפו +<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ez\" draggable=\"true\" data-ez=\"none\">\n          <div class=\"ic flask\">✻<\u002Fdiv>\n          <div><div class=\"nm\">ללא אנזים<\u002Fdiv><div class=\"ds\">קבוצת ביקורת<\u002Fdiv><\u002Fdiv>\n          <span class=\"add\">הוסיפו +<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- tube -->\n    <div class=\"panel\">\n      <div class=\"panel-head\">\n        <span class=\"panel-title\">המבחנה<\u002Fspan>\n        <span class=\"panel-sub\">תמצית מחיידקי S מתים<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"tube-wrap\">\n        <div class=\"tube-zone\" id=\"zone\">\n          <div class=\"tube\" id=\"tube\">\n            <div class=\"cap\"><\u002Fdiv>\n            <div class=\"glass\">\n              <div class=\"liquid\" id=\"liquid\"><\u002Fdiv>\n              <img class=\"deadcell dc1\" src=\"dfe52f04-5065-4003-bcba-5857129b3639\" alt=\"\">\n              <img class=\"deadcell dc2\" src=\"dfe52f04-5065-4003-bcba-5857129b3639\" alt=\"\">\n            <\u002Fdiv>\n            <div class=\"shine\"><\u002Fdiv>\n            <div class=\"enztok\" id=\"enztok\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tube-hint\" id=\"hint\"><span class=\"ar\">↓<\u002Fspan>גררו או הקישו<br>על אנזים<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"contents\">\n        <div class=\"contents-lbl\">תכולת המבחנה<\u002Fdiv>\n        <div class=\"mol-row\" id=\"mols\">\n          <span class=\"mol protein\" data-mol=\"protein\"><span class=\"swatch\"><\u002Fspan>חלבונים<\u002Fspan>\n          <span class=\"mol rna\" data-mol=\"rna\"><span class=\"swatch\"><\u002Fspan>RNA<\u002Fspan>\n          <span class=\"mol dna\" data-mol=\"dna\"><span class=\"swatch\"><\u002Fspan>DNA<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"status\" id=\"status\">המבחנה מכילה תמצית מחיידקי S מתים — חלבונים, RNA ו-DNA.<div class=\"dead-note\">בתוך המבחנה: חיידקי S מתים (אחרי הרתחה)<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"btn-row\">\n        <button class=\"btn btn-primary\" id=\"mixBtn\" disabled=\"\">ערבבו עם חיידקי R חיים<\u002Fbutton>\n        <button class=\"btn btn-ghost\" id=\"resetBtn\" style=\"display:none\">נקו ונסו אנזים אחר<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- phase 2 -->\n  <div class=\"phase2\" id=\"phase2\">\n    <div class=\"stage\">\n      <div class=\"stage-tag\">שלב 2 · ערבוב עם חיידקי R חיים<\u002Fdiv>\n      <div class=\"stage-label\" id=\"stageLabel\"><\u002Fdiv>\n      <div class=\"scene\" id=\"scene\">\n        <div class=\"pour\" id=\"pour\">\n          <div class=\"pcap\"><\u002Fdiv>\n          <div class=\"pbody\"><div class=\"pliq\" id=\"pliq\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"drip\" id=\"drip\"><\u002Fdiv>\n        <div class=\"dish\" id=\"dish\">\n          <div class=\"cell\"><div class=\"glow\"><\u002Fdiv><img class=\"r\" src=\"f90f110f-cf25-4b85-b56a-cdd4edac817a\" alt=\"R\"><img class=\"s\" src=\"dfe52f04-5065-4003-bcba-5857129b3639\" alt=\"S\"><\u002Fdiv>\n          <div class=\"cell\"><div class=\"glow\"><\u002Fdiv><img class=\"r\" src=\"f90f110f-cf25-4b85-b56a-cdd4edac817a\" alt=\"R\"><img class=\"s\" src=\"dfe52f04-5065-4003-bcba-5857129b3639\" alt=\"S\"><\u002Fdiv>\n          <div class=\"cell\"><div class=\"glow\"><\u002Fdiv><img class=\"r\" src=\"f90f110f-cf25-4b85-b56a-cdd4edac817a\" alt=\"R\"><img class=\"s\" src=\"dfe52f04-5065-4003-bcba-5857129b3639\" alt=\"S\"><\u002Fdiv>\n          <div class=\"dish-label\" id=\"dishLabel\">חיידקי R חיים<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"scene-foot\"><span class=\"verdict\" id=\"verdict\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"resultArea\"><\u002Fdiv>\n    <div id=\"tableArea\"><\u002Fdiv>\n    <div class=\"conclusion\" id=\"conclusion\">\n      <img src=\"ec07524e-812f-4599-af3e-5dc744bf3f63\" alt=\"\">\n      <div>\n        <h3>זמן להסיק<\u002Fh3>\n        <p>השוו בין הניסויים בטבלה: באילו מהם התרחשה טרנספורמציה, ובאיזה היא נעצרה? <span class=\"hl\">איזו מולקולה פירקתם דווקא בניסוי שבו הטרנספורמציה נעצרה?<\u002Fspan> מה תוכלו להסיק מכך לגבי החומר שנושא את המידע התורשתי?<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\nconst ENZYMES = {\n  Protease: { label:'Protease', destroys:'protein', icon:'ic-protease', tok:'P', liq:'var(--coral-tint)' },\n  RNase:    { label:'RNase',    destroys:'rna',     icon:'ic-rnase',    tok:'R', liq:'var(--indigo-tint)' },\n  DNase:    { label:'DNase',    destroys:'dna',     icon:'ic-dnase',    tok:'D', liq:'var(--blue-tint)' },\n  none:     { label:'ללא אנזים', destroys:null,      icon:'flask',       tok:'✻', liq:'var(--surface-mute)', control:true }\n};\nconst MOL_HE = { protein:'החלבונים', rna:'ה-RNA', dna:'ה-DNA' };\n\nconst $ = id => document.getElementById(id);\nconst zone=$('zone'), tube=$('tube'), liquid=$('liquid'), enztok=$('enztok'),\n      hint=$('hint'), status=$('status'), mols=$('mols'), mixBtn=$('mixBtn'),\n      resetBtn=$('resetBtn'), phase2=$('phase2'), steps=['st1','st2','st3'];\n\nlet current=null, running=false;\nconst results=[];\nlet sawDNase=false;\n\n/* ---------- input: drag + tap ---------- */\ndocument.querySelectorAll('.ez').forEach(card=>{\n  card.addEventListener('dragstart', e=>{\n    if(card.classList.contains('used')||running){ e.preventDefault(); return; }\n    current=card.dataset.ez;\n    setTimeout(()=>card.classList.add('dragging'),0);\n  });\n  card.addEventListener('dragend', ()=>card.classList.remove('dragging'));\n  card.addEventListener('click', ()=>{\n    if(card.classList.contains('used')||running) return;\n    addEnzyme(card.dataset.ez);\n  });\n});\nzone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('over'); });\nzone.addEventListener('dragleave', ()=>zone.classList.remove('over'));\nzone.addEventListener('drop', e=>{\n  e.preventDefault(); zone.classList.remove('over');\n  if(current) addEnzyme(current);\n});\n\n/* ---------- add enzyme to tube ---------- */\nfunction addEnzyme(key){\n  if(running) return;\n  current=key;\n  const ez=ENZYMES[key];\n\n  zone.classList.add('filled');\n  hint.style.display='none';\n\n  // liquid + token\n  liquid.style.height='66px';\n  liquid.style.background=ez.liq;\n  enztok.className='enztok ic '+(ez.icon==='flask'?'flask':ez.icon)+' drop';\n  enztok.textContent=ez.tok;\n\n  // molecules\n  document.querySelectorAll('.mol').forEach(m=>m.classList.remove('gone'));\n  if(ez.destroys){\n    setTimeout(()=>{ mols.querySelector('[data-mol=\"'+ez.destroys+'\"]').classList.add('gone'); }, 650);\n  }\n\n  // status\n  let txt;\n  if(ez.control){\n    txt='<b>לא הוספתם אנזים.<\u002Fb> התמצית מחיידקי S המתים נשארה כמו שהיא.';\n  } else {\n    txt='<b>הוספתם '+ez.label+'.<\u002Fb> '+MOL_HE[ez.destroys]+' בתמצית פורק'+(ez.destroys==='protein'?'ו':'')+'.';\n  }\n  status.innerHTML=txt+'<div class=\"dead-note\">בתוך המבחנה: חיידקי S מתים (אחרי הרתחה)<\u002Fdiv>';\n\n  mixBtn.disabled=false;\n  resetBtn.style.display='flex';\n  setStep(2,false);\n}\n\n/* ---------- mix ---------- */\nmixBtn.addEventListener('click', ()=>{\n  if(running||!current) return;\n  running=true; mixBtn.disabled=true; resetBtn.style.display='none';\n  runMix(current);\n});\nresetBtn.addEventListener('click', resetAll);\n$('restartBtn').addEventListener('click', restartFull);\n\nfunction restartFull(){\n  if(running) return;\n  results.length=0; sawDNase=false;\n  document.querySelectorAll('.ez').forEach(el=>{\n    el.classList.remove('used');\n    el.querySelector('.add').textContent='הוסיפו +';\n  });\n  $('tableArea').innerHTML='';\n  $('conclusion').classList.remove('show');\n  resetAll();\n}\n\nfunction setStep(n, done3){\n  steps.forEach((id,i)=>{\n    const el=$(id); el.classList.remove('active','done');\n    if(i+1<n) el.classList.add('done');\n    else if(i+1===n) el.classList.add(done3?'done':'active');\n  });\n}\n\nfunction runMix(key){\n  const ez=ENZYMES[key];\n  const transforms = ez.destroys!=='dna'; // DNA present -> transformation\n  phase2.classList.add('show');\n  setStep(2,false);\n\n  const pour=$('pour'), pliq=$('pliq'), drip=$('drip'), dish=$('dish'),\n        stageLabel=$('stageLabel'), verdict=$('verdict'), dishLabel=$('dishLabel');\n  const cells=[...dish.querySelectorAll('.cell')];\n\n  // reset scene\n  pour.className='pour'; drip.className='drip'; dish.className='dish';\n  verdict.className='verdict'; dishLabel.textContent='חיידקי R חיים';\n  cells.forEach(c=>c.className='cell');\n  pliq.style.background=ez.liq;\n  stageLabel.textContent='מוסיפים את תכולת המבחנה לצלחת עם חיידקי R חיים…';\n  phase2.scrollHeight; // reflow\n\n  // bring the animation into view so students don't miss it\n  requestAnimationFrame(()=>{\n    const top = phase2.getBoundingClientRect().top + window.scrollY - 16;\n    window.scrollTo({ top, behavior: 'smooth' });\n  });\n\n  // 1. tube slides in\n  setTimeout(()=>pour.classList.add('in'), 80);\n  // 2. tube tips & pours\n  setTimeout(()=>{ pour.classList.add('tip'); }, 800);\n  setTimeout(()=>{ drip.classList.add('go'); }, 1150);\n  // 3. dish tints\n  setTimeout(()=>{ dish.classList.add('tinted'); stageLabel.textContent='תכולת המבחנה מתערבבת עם חיידקי R…'; }, 2000);\n  // 4. tube leaves\n  setTimeout(()=>{ pour.classList.remove('in'); pour.style.opacity='0'; }, 2600);\n  // 5. outcome\n  setTimeout(()=>{\n    if(transforms){\n      stageLabel.textContent='טרנספורמציה! חיידקי R הפכו לחיידקי S אלימים.';\n      dishLabel.textContent='חיידקי S אלימים';\n      cells.forEach((c,i)=>setTimeout(()=>{ c.classList.add('pop'); setTimeout(()=>c.classList.add('x'),150); }, i*260));\n      setTimeout(()=>{ verdict.className='verdict yes show'; verdict.innerHTML='🧬 R → S · טרנספורמציה התרחשה'.replace('🧬',''); verdict.textContent='R → S · טרנספורמציה התרחשה'; }, 1100);\n    } else {\n      stageLabel.textContent='חיידקי R נשארו ללא שינוי.';\n      dishLabel.textContent='חיידקי R (ללא שינוי)';\n      cells.forEach((c,i)=>setTimeout(()=>c.classList.add('shake'), i*180));\n      setTimeout(()=>{ verdict.className='verdict no show'; verdict.textContent='R נשאר R · אין טרנספורמציה'; }, 900);\n    }\n  }, 2700);\n  // 6. finalize\n  setTimeout(()=>{\n    showResult(key, transforms);\n    results.push({ label:ez.label, destroys:ez.destroys, control:ez.control, transforms });\n    document.querySelector('.ez[data-ez=\"'+key+'\"]').classList.add('used');\n    document.querySelector('.ez[data-ez=\"'+key+'\"] .add').textContent='נוסה ✓';\n    if(key==='DNase') sawDNase=true;\n    running=false;\n    setStep(3,true);\n    if(results.length>=2) showTable();\n    if(sawDNase) $('conclusion').classList.add('show');\n    resetBtn.style.display='flex';\n  }, 4500);\n}\n\nfunction showResult(key, transforms){\n  const ez=ENZYMES[key];\n  const area=$('resultArea');\n  if(transforms){\n    const body = ez.control\n      ? 'ללא אנזים, חיידקי R הפכו לחיידקי S אלימים. זוהי קבוצת הביקורת.'\n      : ('פירקנו את '+MOL_HE[ez.destroys]+', ובכל זאת חיידקי R הפכו לחיידקי S אלימים.');\n    area.innerHTML='<div class=\"result yes\"><img class=\"ric\" src=\"'+window.__resources.iconCorrect+'\" alt=\"\"><div><div class=\"rh\">טרנספורמציה התרחשה<\u002Fdiv><div class=\"rb\">'+body+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  } else {\n    area.innerHTML='<div class=\"result no\"><img class=\"ric\" src=\"'+window.__resources.iconIdea+'\" alt=\"\"><div><div class=\"rh\">הטרנספורמציה נעצרה!<\u002Fdiv><div class=\"rb\">פירקנו את ה-DNA (באמצעות DNase) — והפעם חיידקי R לא השתנו ונשארו R.<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }\n}\n\nfunction showTable(){\n  const rows=results.map(r=>{\n    const destroyed = r.control ? '—' : MOL_HE[r.destroys].replace('ה-','').replace(/^ה/,'');\n    const badge = r.transforms ? '<span class=\"tbadge yes\">התרחשה'+(r.control?' (ביקורת)':'')+'<\u002Fspan>' : '<span class=\"tbadge no\">נעצרה<\u002Fspan>';\n    return '<tr><td>'+r.label+'<\u002Ftd><td>'+destroyed+'<\u002Ftd><td>'+badge+'<\u002Ftd><\u002Ftr>';\n  }).join('');\n  $('tableArea').innerHTML =\n    '<div class=\"obs-lbl\"><img src=\"'+window.__resources.iconGauge+'\" style=\"height:22px\" alt=\"\">טבלת תצפיות<\u002Fdiv>'+\n    '<table class=\"obs\"><thead><tr><th>אנזים שהוסף<\u002Fth><th>מה פורק<\u002Fth><th>טרנספורמציה<\u002Fth><\u002Ftr><\u002Fthead><tbody>'+rows+'<\u002Ftbody><\u002Ftable>';\n}\n\nfunction resetAll(){\n  if(running) return;\n  current=null;\n  zone.classList.remove('filled','over');\n  hint.style.display='block';\n  liquid.style.height='0'; liquid.style.background='var(--blue-tint)';\n  enztok.className='enztok'; enztok.textContent='';\n  document.querySelectorAll('.mol').forEach(m=>m.classList.remove('gone'));\n  status.innerHTML='המבחנה מכילה תמצית מחיידקי S מתים — חלבונים, RNA ו-DNA.<div class=\"dead-note\">בתוך המבחנה: חיידקי S מתים (אחרי הרתחה)<\u002Fdiv>';\n  mixBtn.disabled=true; resetBtn.style.display='none';\n  phase2.classList.remove('show');\n  $('resultArea').innerHTML='';\n  setStep(1,false);\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
